version: "1.0"

services:
  mongodb:
    image: mongo:latest
    container_name: MongoDB
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123qweQWE!
    volumes:
      - mongodb-data:/data/db
      
volumes:
  mongodb-data: