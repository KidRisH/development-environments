version: "1.0"
services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: DB-MSSqlServer
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "123qweQWE!"
    ports:
      - 1433:1433
    volumes:
      - db-mssql-data:/var/opt/mssql
  
  postgres:
    image: postgres
    container_name: DB-PostgreSql
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123qweQWE!
    volumes:
      - db-postgresql-data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: DB-PgAdmin4
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kidrish.com
      PGADMIN_DEFAULT_PASSWORD: 123qweQWE!
    volumes:
      - db-pgadmin4-data:/var/lib/pgadmin
  
  mongodb:
    image: mongo:latest
    container_name: DB-MongoDB
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123qweQWE!
    volumes:
      - db-mongo-data:/data/db

volumes:
  db-mongo-data:
  db-mssql-data:
  db-postgresql-data:
  db-pgadmin4-data: